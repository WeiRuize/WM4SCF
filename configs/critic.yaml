# Safety Critic Configuration (Stage 2 — latent-based)
# Trained on pre-encoded RSSM latent features from data/encode_latents.py.

critic:
  mlp_layers: 2
  mlp_units: 256
  dropout: 0.1
  act: SiLU
  td_horizon: 10           # K in C_target_t = Σ_{k=0}^{K} γ^k · c_{t+k}
  gamma: 0.9

lagrangian:
  budget: 0.1              # target average cost b
  lambda_init: 1.0
  lambda_max: 100.0
  lambda_lr: 1.0e-3

training:
  seed: 0
  device: cuda:0
  batch_size: 32           # episodes per batch (latent steps are flattened inside)
  epochs: 50
  lr: 1.0e-4
  weight_decay: 1.0e-4
  val_split: 0.1
  log_every: 50
  save_every: 5

paths:
  logdir: logs/critic
  latent_dir: data/latents
  checkpoint: checkpoints/critic/best.ckpt
